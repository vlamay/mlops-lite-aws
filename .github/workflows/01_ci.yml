name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install -U pip
          python -m pip install -r ml/training/requirements.txt -r ml/validation/requirements.txt -r ml/drift/requirements.txt
          python -m pip install pytest
      - name: Run tests
        run: pytest -q
